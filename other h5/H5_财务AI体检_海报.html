<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财务AI体检海报</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  background: #0A2540;
  font-family: "PingFang SC", "Microsoft YaHei", "Heiti SC", sans-serif;
  display: flex;
  flex-direction: column;
  padding: 60px;
  position: relative;
}
.accent-bar {
  width: 100%;
  height: 6px;
  background: #3B82F6;
  border-radius: 3px;
  margin-bottom: 40px;
}
.main-title {
  font-size: 88px;
  font-weight: 700;
  color: #FFFFFF;
  line-height: 1.1;
  margin-bottom: 4px;
}
.main-title .blue {
  color: #3B82F6;
}
.divider {
  width: 80px;
  height: 4px;
  background: #3B82F6;
  margin: 36px 0;
  border-radius: 2px;
}
.benefits {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.benefit {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 40px;
  color: #CBD5E1;
  font-weight: 500;
}
.bullet {
  width: 10px;
  height: 10px;
  background: #3B82F6;
  border-radius: 50%;
  flex-shrink: 0;
}
.tagline {
  font-size: 32px;
  color: #94A3B8;
  margin-top: 32px;
  padding-top: 32px;
  border-top: 1px solid #1E3A5F;
}
.bottom-area {
  position: absolute;
  bottom: 60px;
  right: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.qr-wrapper {
  width: 340px;
  height: 340px;
  background: white;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.qr-wrapper img {
  width: 100%;
  height: 100%;
}
.scan-label {
  font-size: 26px;
  color: #94A3B8;
  font-weight: 500;
}
.brand {
  position: absolute;
  bottom: 80px;
  left: 60px;
  font-size: 24px;
  color: #64748B;
}
</style>
</head>
<body>

<div class="accent-bar"></div>

<div class="main-title">
  你的财务团队<br>
  需要<span class="blue">AI</span>吗？
</div>

<div class="divider"></div>

<div class="benefits">
  <div class="benefit"><span class="bullet"></span>5分钟 · 12道题</div>
  <div class="benefit"><span class="bullet"></span>看清你的财务AI成熟度</div>
  <div class="benefit"><span class="bullet"></span>找到最高ROI的切入点</div>
  <div class="benefit"><span class="bullet"></span>和同行对照，真实数据</div>
</div>

<div class="tagline">扫码自测，认真的</div>

<div class="bottom-area">
  <div class="qr-wrapper">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=340x340&data=http://leaping.site&format=png" alt="QR">
  </div>
  <div class="scan-label">扫码自测</div>
</div>

<div class="brand">有二财经 出品</div>

</body>
</html>

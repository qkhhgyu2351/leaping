<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Cover - IPO Assessment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; }
  .cover {
    width: 900px;
    height: 383px;
    background: linear-gradient(135deg, #0d2240 0%, #081525 50%, #0a1628 100%);
    position: relative;
    overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  /* 装饰圆 */
  .circle-1 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    border: 1px solid rgba(59,130,246,0.08);
    top: -150px; right: -100px;
  }
  .circle-2 {
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    border: 1px solid rgba(59,130,246,0.12);
    bottom: -80px; left: 60px;
    background: radial-gradient(circle, rgba(59,130,246,0.04) 0%, transparent 70%);
  }
  /* 主视觉 - 上升曲线变问号 */
  .chart-area {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    height: 200px;
  }
  .chart-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 100%;
  }
  .chart-line svg {
    width: 100%; height: 100%;
  }
  /* 标题区 */
  .title-area {
    position: absolute;
    left: 60px;
    top: 50%;
    transform: translateY(-50%);
    max-width: 480px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .brand-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3b82f6;
    box-shadow: 0 0 8px rgba(59,130,246,0.8);
  }
  .brand-text {
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
  }
  .main-title {
    font-size: 42px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.15;
    letter-spacing: -1px;
  }
  .main-title .blue {
    color: #60a5fa;
  }
  .subtitle {
    font-size: 18px;
    color: rgba(255,255,255,0.45);
    margin-top: 16px;
    line-height: 1.5;
  }
  /* 底部装饰线 */
  .bottom-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #1a56db, #3b82f6, #60a5fa);
  }
</style>
</head>
<body>
<div class="cover">
  <div class="circle-1"></div>
  <div class="circle-2"></div>
  
  <div class="title-area">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-text">有二财经</span>
    </div>
    <h1 class="main-title">
      你的企业<span class="blue">能上市吗？</span><br>
      先别急着算净利润
    </h1>
    <p class="subtitle">上市审核看五个维度，缺一条，<br>财务再好看也报不上去</p>
  </div>
  
  <div class="chart-area">
    <svg viewBox="0 0 280 200" fill="none">
      <!-- 网格线 -->
      <line x1="0" y1="160" x2="280" y2="160" stroke="rgba(59,130,246,0.1)" stroke-width="1"/>
      <line x1="0" y1="120" x2="280" y2="120" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
      <line x1="0" y1="80" x2="280" y2="80" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>
      <line x1="0" y1="40" x2="280" y2="40" stroke="rgba(59,130,246,0.04)" stroke-width="1"/>
      
      <!-- 上升曲线 -->
      <path d="M20 140 Q60 130, 80 100 T140 70 T200 40 T260 20" 
            stroke="url(#gradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
      
      <!-- 数据点 -->
      <circle cx="20" cy="140" r="5" fill="#3b82f6"/>
      <circle cx="80" cy="100" r="5" fill="#3b82f6"/>
      <circle cx="140" cy="70" r="5" fill="#3b82f6"/>
      <circle cx="200" cy="40" r="5" fill="#3b82f6"/>
      <circle cx="260" cy="20" r="7" fill="#60a5fa" stroke="#ffffff" stroke-width="2"/>
      
      <!-- 问号 -->
      <text x="250" y="55" fill="#f97316" font-size="36" font-weight="900" font-family="PingFang SC, sans-serif">?</text>
      
      <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#1a56db"/>
          <stop offset="50%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#60a5fa"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
  
  <div class="bottom-line"></div>
</div>
</body>
</html>

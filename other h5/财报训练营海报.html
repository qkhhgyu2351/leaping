<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上市公司财报深读训练营</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .poster {
            background: white;
            border-radius: 20px;
            max-width: 420px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }
        .header {
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 16px;
            opacity: 0.95;
            font-weight: 400;
        }
        .content {
            padding: 30px;
        }
        .highlight-box {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border-left: 4px solid #2563eb;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 8px;
        }
        .highlight-text {
            font-size: 14px;
            color: #1e40af;
            line-height: 1.6;
            font-weight: 500;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .section-title::before {
            content: "";
            width: 4px;
            height: 20px;
            background: #2563eb;
            margin-right: 10px;
            border-radius: 2px;
        }
        .day-item {
            margin-bottom: 15px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }
        .day-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .day-number {
            background: #2563eb;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 10px;
        }
        .day-title {
            font-size: 15px;
            font-weight: 600;
            color: #1e293b;
        }
        .day-desc {
            font-size: 13px;
            color: #64748b;
            line-height: 1.5;
            margin-left: 52px;
        }
        .deliverables {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .deliverable-title {
            font-size: 14px;
            font-weight: 600;
            color: #92400e;
            margin-bottom: 8px;
        }
        .deliverable-item {
            font-size: 13px;
            color: #78350f;
            margin-bottom: 5px;
            padding-left: 15px;
            position: relative;
        }
        .deliverable-item::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #d97706;
            font-weight: 700;
        }
        .audience {
            margin-bottom: 25px;
        }
        .audience-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .audience-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .audience-tag {
            background: #eff6ff;
            color: #1e40af;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
        }
        .price-section {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .price-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 5px;
        }
        .price-value {
            font-size: 42px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: baseline;
            justify-content: center;
        }
        .price-currency {
            font-size: 24px;
            margin-right: 2px;
        }
        .price-limit {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 5px;
        }
        .cta {
            text-align: center;
            font-size: 13px;
            color: #64748b;
            line-height: 1.6;
        }
        .cta-highlight {
            color: #2563eb;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="header">
            <div class="badge">内测招募 · 限3人</div>
            <div class="title">上市公司财报深读训练营</div>
            <div class="subtitle">3天线上小班 · 每天2小时</div>
        </div>
        
        <div class="content">
            <div class="highlight-box">
                <div class="highlight-text">
                    17年财务和投资经历 · 高级会计师<br>
                    用AI重新定义财报分析方法
                </div>
            </div>
            
            <div class="section-title">3天学习内容</div>
            
            <div class="day-item">
                <div class="day-header">
                    <span class="day-number">Day1</span>
                    <span class="day-title">建立判断框架</span>
                </div>
                <div class="day-desc">从业务到财报，找到上市公司投资价值</div>
            </div>
            
            <div class="day-item">
                <div class="day-header">
                    <span class="day-number">Day2</span>
                    <span class="day-title">用AI提效</span>
                </div>
                <div class="day-desc">把几天工作压缩到几小时，学会信息整理能力</div>
            </div>
            
            <div class="day-item">
                <div class="day-header">
                    <span class="day-number">Day3</span>
                    <span class="day-title">输出分析报告</span>
                </div>
                <div class="day-desc">做一份完整报告，学会结构化输出能力</div>
            </div>
            
            <div class="deliverables">
                <div class="deliverable-title">学完你能拿到</div>
                <div class="deliverable-item">一套可复用的财报分析框架</div>
                <div class="deliverable-item">一份自己做出来的上市公司分析报告</div>
            </div>
            
            <div class="audience">
                <div class="audience-label">适合人群</div>
                <div class="audience-tags">
                    <span class="audience-tag">股票投资人</span>
                    <span class="audience-tag">财务总监/经理</span>
                    <span class="audience-tag">财务主管</span>
                </div>
            </div>
            
            <div class="price-section">
                <div class="price-label">内测价</div>
                <div class="price-value">
                    <span class="price-currency">¥</span>
                    <span>999</span>
                </div>
                <div class="price-limit">限3人 · 额满即止</div>
            </div>
            
            <div class="cta">
                有兴趣私信 <span class="cta-highlight">"财报训练"</span>
            </div>
        </div>
    </div>
</body>
</html>

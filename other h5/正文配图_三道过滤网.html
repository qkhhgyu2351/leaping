<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正文配图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 640px;
  background: linear-gradient(135deg, #0A2540 0%, #0f2d4f 100%);
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  flex-direction: column;
  padding: 60px 80px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  bottom: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  border: 60px solid rgba(59,130,246,0.06);
  pointer-events: none;
}
.header {
  margin-bottom: 50px;
}
.header-line {
  font-size: 24px;
  font-weight: 700;
  color: #60a5fa;
  letter-spacing: 4px;
  margin-bottom: 12px;
}
.header-title {
  font-size: 48px;
  font-weight: 900;
  color: #ffffff;
  line-height: 1.3;
}
.cards {
  display: flex;
  gap: 28px;
  flex: 1;
  align-items: stretch;
}
.card {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 36px 30px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 3px 3px 0 0;
}
.card:nth-child(1)::before { background: #3b82f6; }
.card:nth-child(2)::before { background: #60a5fa; }
.card:nth-child(3)::before { background: #93c5fd; }
.card-number {
  font-size: 56px;
  font-weight: 900;
  color: rgba(255,255,255,0.08);
  position: absolute;
  top: 10px;
  right: 20px;
}
.card-icon {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  background: rgba(59,130,246,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
  font-size: 26px;
}
.card-title {
  font-size: 30px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 14px;
}
.card-desc {
  font-size: 22px;
  color: rgba(255,255,255,0.65);
  line-height: 1.7;
  flex: 1;
}
.footer {
  margin-top: 36px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.footer-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}
.footer-text {
  font-size: 20px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 1px;
}
</style>
</head>
<body>
  <div class="header">
    <div class="header-line">CFO级诊断引擎</div>
    <div class="header-title">财务AI准备度：三道过滤网</div>
  </div>
  <div class="cards">
    <div class="card">
      <div class="card-number">01</div>
      <div class="card-icon">🎯</div>
      <div class="card-title">靶向过滤</div>
      <div class="card-desc">剔除伪痛点<br>只测4个真实场景<br>算账 / 管钱 / 堵漏 / 人才</div>
    </div>
    <div class="card">
      <div class="card-number">02</div>
      <div class="card-icon">💧</div>
      <div class="card-title">数据脱水</div>
      <div class="card-desc">大白话还原真实场景<br>不懂技术也能<br>一秒钟对号入座</div>
    </div>
    <div class="card">
      <div class="card-number">03</div>
      <div class="card-icon">⚡</div>
      <div class="card-title">门槛过滤</div>
      <div class="card-desc">数据底子不达标<br>直接劝退<br>不浪费一分钱</div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-dot"></div>
    <div class="footer-dot"></div>
    <div class="footer-dot"></div>
    <div class="footer-text">不做无谓的试错 · 先弄清自己是哪种体质，再去找对应的药</div>
  </div>
</body>
</html>

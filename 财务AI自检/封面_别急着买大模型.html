<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号封面</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  background: linear-gradient(135deg, #0A2540 0%, #1a3a5c 50%, #0d4f7a 100%);
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 80%;
  height: 200%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.03) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
}
.container {
  text-align: center;
  padding: 0 80px;
  position: relative;
  z-index: 1;
}
.label {
  display: inline-block;
  font-size: 22px;
  font-weight: 700;
  color: #60a5fa;
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 40px;
  border: 1.5px solid rgba(96, 165, 250, 0.4);
  padding: 10px 28px;
  border-radius: 100px;
}
.main-title {
  font-size: 88px;
  font-weight: 900;
  color: #ffffff;
  line-height: 1.2;
  margin-bottom: 36px;
  letter-spacing: -1px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.main-title .highlight {
  color: #60a5fa;
}
.subtitle {
  font-size: 38px;
  font-weight: 400;
  color: rgba(255,255,255,0.85);
  line-height: 1.6;
  margin-bottom: 70px;
}
.divider {
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, #3b82f6, #60a5fa);
  margin: 0 auto 50px;
  border-radius: 2px;
}
.tags {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}
.tag {
  font-size: 22px;
  color: rgba(255,255,255,0.7);
  padding: 10px 24px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  background: rgba(255,255,255,0.05);
}
.brand {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-size: 26px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  letter-spacing: 3px;
}
</style>
</head>
<body>
  <div class="container">
    <div class="label">财务人必读</div>
    <div class="main-title">别急着买大模型！</div>
    <div class="subtitle">先算算公司这堆烂账<br>到底"配不配"上AI</div>
    <div class="divider"></div>
    <div class="tags">
      <span class="tag">算账与汇报</span>
      <span class="tag">管钱与催款</span>
      <span class="tag">堵漏与防坑</span>
      <span class="tag">人才与团队</span>
    </div>
  </div>
  <div class="brand">有二财经</div>
</body>
</html>

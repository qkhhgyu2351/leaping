<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有二财经 — AI多懂企业，企业就有多强</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #060F1E;
    --navy-mid: #0D1F3C;
    --navy-light: #1A3258;
    --blue: #1B6FE8;
    --blue-light: #3B8AF5;
    --gold: #B8964A;
    --gold-light: #D4AE6A;
    --white: #FFFFFF;
    --paper: #FAF9F6;
    --text: #0E1726;
    --text-mid: #3A4A5C;
    --text-muted: #6B7D93;
    --border: #E2E5EA;
    --border-dark: #1E3257;
    --font-serif: 'Noto Serif SC', Georgia, serif;
    --font-sans: 'Noto Sans SC', system-ui, sans-serif;
    --font-display: 'Playfair Display', Georgia, serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-sans); background: var(--paper); color: var(--text); -webkit-font-smoothing: antialiased; min-height: 100vh; }

  /* TICKER */
  .ticker-wrap { background: var(--navy); color: rgba(255,255,255,0.65); font-size: 11px; overflow: hidden; height: 32px; display: flex; align-items: center; }
  .ticker-label { background: var(--gold); color: var(--navy); font-weight: 700; font-size: 10px; letter-spacing: 0.12em; padding: 0 14px; height: 100%; display: flex; align-items: center; flex-shrink: 0; white-space: nowrap; }
  .ticker-track { display: flex; animation: ticker 32s linear infinite; white-space: nowrap; gap: 60px; padding-left: 40px; }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker-item { display: flex; align-items: center; gap: 8px; }
  .ticker-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

  /* HEADER */
  header { background: var(--navy); border-bottom: 1px solid var(--border-dark); position: sticky; top: 0; z-index: 100; }
  .header-top { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { display: flex; align-items: baseline; gap: 10px; cursor: pointer; }
  .logo-cn { font-family: var(--font-serif); font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: 0.05em; }
  .logo-en { font-family: var(--font-display); font-size: 11px; color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase; }
  .header-actions { display: flex; align-items: center; gap: 16px; }
  .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.75); padding: 6px 16px; font-size: 13px; font-family: var(--font-sans); cursor: pointer; transition: all 0.2s; }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.5); color: white; }
  .btn-primary-sm { background: var(--blue); border: none; color: white; padding: 7px 20px; font-size: 13px; font-family: var(--font-sans); cursor: pointer; transition: background 0.2s; font-weight: 500; }
  .btn-primary-sm:hover { background: var(--blue-light); }

  /* NAV */
  nav { background: var(--navy-mid); border-bottom: 1px solid var(--border-dark); }
  .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; height: 44px; }
  .nav-item { padding: 0 20px; height: 100%; display: flex; align-items: center; font-size: 13.5px; color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em; position: relative; white-space: nowrap; border: none; background: none; font-family: var(--font-sans); }
  .nav-item:hover { color: white; }
  .nav-item.active { color: white; }
  .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--gold); }
  .nav-tag { background: var(--blue); color: white; font-size: 9px; padding: 1px 5px; margin-left: 5px; font-weight: 600; }

  /* LAYOUT */
  .page { min-height: calc(100vh - 140px); animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

  /* HERO */
  .hero { background: var(--navy); position: relative; overflow: hidden; }
  .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(27,111,232,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(27,111,232,0.06) 1px, transparent 1px); background-size: 48px 48px; }
  .hero-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(27,111,232,0.15) 0%, transparent 70%); top: -200px; right: -100px; pointer-events: none; }
  .hero-inner { max-width: 1280px; margin: 0 auto; padding: 72px 32px 64px; display: grid; grid-template-columns: 1fr 420px; gap: 64px; align-items: start; position: relative; }
  .hero-eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .eyebrow-line { width: 32px; height: 1px; background: var(--gold); }
  .eyebrow-text { font-size: 11px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; font-weight: 500; }
  .hero-title { font-family: var(--font-serif); font-size: clamp(34px, 4vw, 50px); color: var(--white); line-height: 1.25; font-weight: 700; margin-bottom: 24px; }
  .hero-title em { font-style: normal; color: var(--blue-light); }
  .hero-desc { font-size: 15px; color: rgba(255,255,255,0.55); line-height: 1.85; max-width: 520px; margin-bottom: 36px; }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-hero { background: var(--blue); color: white; border: none; padding: 12px 28px; font-size: 14px; font-family: var(--font-sans); font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .btn-hero:hover { background: var(--blue-light); }
  .btn-hero-outline { background: transparent; color: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.2); padding: 12px 28px; font-size: 14px; font-family: var(--font-sans); cursor: pointer; transition: all 0.2s; }
  .btn-hero-outline:hover { border-color: rgba(255,255,255,0.5); color: white; }
  .hero-stats { display: flex; gap: 32px; margin-top: 48px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.08); }
  .stat-num { font-family: var(--font-display); font-size: 28px; color: white; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; letter-spacing: 0.06em; }

  /* HERO FEATURED */
  .hero-featured { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 28px; }
  .featured-label { font-size: 10px; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; font-weight: 600; margin-bottom: 16px; }
  .featured-card { cursor: pointer; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 20px; transition: opacity 0.2s; }
  .featured-card:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .featured-card:hover { opacity: 0.8; }
  .featured-cat { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
  .cat-tax { color: #4DA8FF; }
  .cat-corp { color: #5DD6A0; }
  .cat-listed { color: #F7B84B; }
  .cat-fin { color: #D07CF5; }
  .featured-card-title { font-family: var(--font-serif); font-size: 15px; color: white; line-height: 1.5; margin-bottom: 8px; }
  .featured-meta { font-size: 11px; color: rgba(255,255,255,0.35); }

  /* FOUNDER STRIP */
  .founder-strip { background: var(--navy-mid); border-bottom: 1px solid var(--border-dark); padding: 0; }
  .founder-strip-inner { max-width: 1280px; margin: 0 auto; padding: 20px 32px; display: flex; align-items: center; gap: 24px; }
  .founder-avatar-sm { width: 44px; height: 44px; border-radius: 50%; background: var(--navy-light); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 18px; color: var(--gold); font-weight: 700; flex-shrink: 0; }
  .founder-strip-text { flex: 1; }
  .founder-strip-name { font-size: 14px; font-weight: 600; color: white; }
  .founder-strip-creds { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .founder-strip-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .founder-tag-sm { font-size: 10px; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); padding: 2px 8px; letter-spacing: 0.04em; }
  .founder-tag-sm.gold { border-color: rgba(184,150,74,0.4); color: var(--gold); }

  /* SECTION */
  .section-header { display: flex; align-items: baseline; justify-content: space-between; padding: 48px 0 24px; border-bottom: 2px solid var(--text); margin-bottom: 32px; }
  .section-title { font-family: var(--font-serif); font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
  .section-more { font-size: 12px; color: var(--blue); letter-spacing: 0.08em; cursor: pointer; background: none; border: none; font-family: var(--font-sans); }
  .section-more:hover { color: var(--blue-light); }

  /* ARTICLES GRID */
  .articles-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1px; background: var(--border); margin-bottom: 48px; }
  .article-cell { background: var(--paper); padding: 28px; cursor: pointer; transition: background 0.15s; }
  .article-cell:hover { background: white; }
  .article-cell.featured { padding: 36px; }
  .art-cat { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .art-cat::before { content: ''; display: inline-block; width: 16px; height: 2px; background: currentColor; }
  .article-title { font-family: var(--font-serif); font-size: 20px; line-height: 1.45; color: var(--text); margin-bottom: 12px; font-weight: 600; }
  .article-cell:not(.featured) .article-title { font-size: 16px; }
  .article-excerpt { font-size: 13.5px; color: var(--text-mid); line-height: 1.75; margin-bottom: 16px; }
  .article-meta { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 12px; }
  .meta-sep { width: 1px; height: 10px; background: var(--border); }
  .article-img-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--navy-mid); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .article-img-placeholder::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); }
  .img-label { position: relative; font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 0.1em; }

  /* 4 COLUMNS */
  .columns-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); margin-bottom: 48px; }
  .column-block { background: var(--paper); padding: 28px 24px; }
  .column-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid currentColor; }
  .column-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .column-name { font-family: var(--font-serif); font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
  .col-tax { color: #1B6FE8; }
  .col-corp { color: #0D9E6E; }
  .col-listed { color: #C47C10; }
  .col-fin { color: #7B3FD4; }
  .col-article { padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .col-article:last-child { border-bottom: none; }
  .col-article:hover .col-art-title { color: var(--blue); }
  .col-art-title { font-size: 13.5px; line-height: 1.6; color: var(--text); margin-bottom: 4px; transition: color 0.15s; }
  .col-art-meta { font-size: 11px; color: var(--text-muted); }

  /* TOOL CARD */
  .tool-section { background: var(--navy); margin-bottom: 0; padding: 48px 0; }
  .tool-card-inner { max-width: 680px; margin: 0 auto; padding: 0 32px; text-align: center; }
  .tool-card-inner .tool-badge { font-size: 10px; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; }
  .tool-title { font-family: var(--font-serif); font-size: 26px; color: white; font-weight: 700; margin-bottom: 10px; }
  .tool-desc { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.8; margin-bottom: 8px; }
  .tool-meta { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 24px; }
  .btn-tool { background: var(--blue); border: none; color: white; padding: 14px 40px; font-size: 15px; font-family: var(--font-sans); font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-tool:hover { background: var(--blue-light); }

  /* WECHAT */
  .wechat-section { padding: 48px 0; }
  .wechat-card { max-width: 480px; margin: 0 auto; background: white; border: 1px solid var(--border); padding: 36px; text-align: center; }
  .wechat-title { font-family: var(--font-serif); font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .wechat-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .wechat-id-display { display: inline-block; background: rgba(27,111,232,0.05); border: 1px dashed rgba(27,111,232,0.3); padding: 10px 28px; font-size: 22px; font-weight: 700; color: var(--blue); letter-spacing: 2px; margin-bottom: 16px; }
  .btn-copy { background: var(--blue); border: none; color: white; padding: 11px 32px; font-size: 14px; font-family: var(--font-sans); font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-copy:hover { background: var(--blue-light); }
  .wechat-note { font-size: 11px; color: var(--text-muted); margin-top: 10px; }

  /* NEWSLETTER */
  .newsletter-bar { background: var(--navy); padding: 48px 32px; display: flex; align-items: center; gap: 48px; }
  .nl-left { flex: 1; }
  .nl-label { font-size: 10px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  .nl-title { font-family: var(--font-serif); font-size: 24px; color: white; font-weight: 700; }
  .nl-desc { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 8px; }
  .nl-form { display: flex; flex-shrink: 0; }
  .nl-input { width: 280px; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-right: none; color: white; font-size: 14px; font-family: var(--font-sans); outline: none; }
  .nl-input::placeholder { color: rgba(255,255,255,0.3); }
  .nl-btn { background: var(--blue); border: none; color: white; padding: 12px 24px; font-size: 14px; font-family: var(--font-sans); font-weight: 500; cursor: pointer; white-space: nowrap; }
  .nl-btn:hover { background: var(--blue-light); }

  /* PAGE HEADER */
  .page-header { background: var(--navy); padding: 48px 0 40px; }
  .page-title { font-family: var(--font-serif); font-size: 36px; color: white; font-weight: 700; margin-bottom: 8px; }
  .page-subtitle { font-size: 14px; color: rgba(255,255,255,0.45); }

  /* FILTER */
  .filter-bar { background: white; border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; gap: 0; position: sticky; top: 108px; z-index: 50; }
  .filter-item { padding: 14px 20px; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--font-sans); }
  .filter-item:hover { color: var(--text); }
  .filter-item.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* ARTICLES LIST */
  .articles-list { max-width: 1280px; margin: 0 auto; padding: 40px 32px; display: grid; grid-template-columns: 1fr 320px; gap: 48px; align-items: start; }
  .art-list-item { display: grid; grid-template-columns: 1fr 200px; gap: 24px; padding: 28px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
  .art-list-item:hover { opacity: 0.75; }
  .art-list-item:first-child { padding-top: 0; }
  .ali-cat { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; }
  .ali-title { font-family: var(--font-serif); font-size: 19px; line-height: 1.45; color: var(--text); margin-bottom: 8px; font-weight: 600; }
  .ali-excerpt { font-size: 13px; color: var(--text-mid); line-height: 1.7; margin-bottom: 10px; }
  .ali-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 10px; }
  .ali-img { aspect-ratio: 4/3; background: var(--navy-mid); flex-shrink: 0; }

  /* SIDEBAR */
  .sidebar-block { border: 1px solid var(--border); padding: 24px; margin-bottom: 24px; background: white; }
  .sidebar-title { font-family: var(--font-serif); font-size: 14px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .sidebar-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-mid); cursor: pointer; transition: color 0.15s; line-height: 1.5; }
  .sidebar-item:hover { color: var(--blue); }
  .sidebar-item:last-child { border-bottom: none; }

  /* ARTICLE DETAIL */
  .article-detail { max-width: 1280px; margin: 0 auto; padding: 48px 32px; display: grid; grid-template-columns: 1fr 300px; gap: 64px; }
  .detail-cat { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .detail-title { font-family: var(--font-serif); font-size: 36px; line-height: 1.3; font-weight: 700; margin-bottom: 16px; }
  .detail-subtitle { font-size: 17px; color: var(--text-mid); line-height: 1.7; margin-bottom: 24px; }
  .detail-meta { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text-muted); padding: 20px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 36px; }
  .detail-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .detail-content p { font-size: 16px; line-height: 1.9; color: var(--text-mid); margin-bottom: 20px; }
  .detail-content h3 { font-family: var(--font-serif); font-size: 20px; color: var(--text); margin: 32px 0 14px; font-weight: 700; }
  .detail-content blockquote { border-left: 3px solid var(--blue); padding: 16px 20px; background: rgba(27,111,232,0.04); margin: 24px 0; font-style: italic; color: var(--text-mid); font-size: 15px; line-height: 1.7; }
  .detail-img { width: 100%; aspect-ratio: 16/9; background: var(--navy-mid); margin: 28px 0; display: flex; align-items: center; justify-content: center; }
  .detail-signature { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); line-height: 1.7; }

  /* SERVICES */
  .services-hero { background: var(--navy); padding: 64px 0; }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); margin: 48px 0; }
  .service-card { background: var(--paper); padding: 36px 32px; transition: background 0.15s; }
  .service-card:hover { background: white; }
  .svc-num { font-family: var(--font-display); font-size: 40px; color: var(--border); font-weight: 700; line-height: 1; margin-bottom: 20px; }
  .svc-title { font-family: var(--font-serif); font-size: 20px; font-weight: 700; margin-bottom: 12px; }
  .svc-desc { font-size: 14px; color: var(--text-mid); line-height: 1.8; margin-bottom: 20px; }
  .svc-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .svc-tag { font-size: 11px; color: var(--text-muted); border: 1px solid var(--border); padding: 3px 10px; }

  /* MEMBERSHIP */
  .plans-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); margin: 48px 0; }
  .plan-card { background: var(--paper); padding: 40px 32px; position: relative; }
  .plan-card.featured-plan { background: var(--navy); }
  .plan-badge { position: absolute; top: 0; right: 24px; background: var(--gold); color: var(--navy); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 4px 12px; text-transform: uppercase; }
  .plan-name { font-family: var(--font-serif); font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .plan-card.featured-plan .plan-name { color: white; }
  .plan-price { font-family: var(--font-display); font-size: 48px; font-weight: 700; line-height: 1; margin: 20px 0 6px; }
  .plan-card.featured-plan .plan-price { color: white; }

function AssessmentPage({ setPage }) {
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState({});
  const [done, setDone] = useState(false);
  const questions = [
    { q: "你的企业目前是否有专职的财务数据分析岗位？", a: ["有，2人以上","有，1人","没有，财务兼做","没有，老板直接看报表"] },
    { q: "你们的财务数据现在主要存储在哪里？", a: ["ERP系统（如SAP、用友、金蝶）","Excel或WPS表格","纸质 + 手工录入","基本没有系统化存储"] },
    { q: "你的财务团队每月有多少时间花在数据整理而非分析上？", a: ["不到20%","20%-50%","50%-80%","80%以上，大部分时间整理数据"] },
    { q: "老板或管理层获取经营数据报告的方式是？", a: ["自助BI看板，随时查","财务每月固定汇报","有需要时临时请财务做","基本靠感觉和经验判断"] },
    { q: "你们有没有做过数字化/信息化建设的经历？", a: ["有，ERP上线超过2年且正常运行","有，但用的不太好","正在推进中","没有，或者失败过"] },
    { q: "财务团队对AI工具的接受程度如何？", a: ["已经有人在用AI辅助工作","愿意学，但不知道从哪里开始","有顾虑，担心被替代","完全不感兴趣或抵触"] },
    { q: "你的企业目前月营收规模大概是？", a: ["1000万以上","300万-1000万","100万-300万","100万以下"] },
    { q: "老板/决策层对AI落地的态度是？", a: ["主动推动，已有预算","感兴趣，但还在观望","持怀疑态度","没有关注这个方向"] },
    { q: "你们最大的财务痛点是什么？", a: ["报表慢、数据不准","合规风险，不确定税务底线","看不清业务和财务的关联","融资/资本运作方面的障碍"] },
    { q: "如果有一个工具能帮你做一件事，你最想要哪个？", a: ["自动生成月度管理报表","智能税务风险预警","AI帮我分析竞争对手财报","帮我准备融资BP和财务模型"] },
  ];

  const score = Object.values(answers).reduce((s, v) => s + (3 - v), 0);
  const maxScore = questions.length * 3;
  const pct = Math.round((score / maxScore) * 100);

  let level, levelColor, advice;
  if (pct >= 70) {
    level = "AI就绪型"; levelColor = "#0D9E6E";
    advice = "你的企业数据基础和团队意愿都不错，可以直接开始在核心财务流程中引入AI工具。建议从报表自动化和税务风险预警入手，3个月内可见成效。";
  } else if (pct >= 40) {
    level = "修路阶段"; levelColor = "#C47C10";
    advice = "你的企业具备一定基础，但还需要先打好数据地基——梳理财务数据流、规范存储方式，再引入AI工具。急着买AI产品容易变成「人工智障」。";
  } else {
    level = "夯实基础"; levelColor = "#E84040";
    advice = "暂时不建议直接上AI。先解决最基本的财务信息化问题：把数据从Excel和纸质迁移到系统，财务流程标准化，这才是AI落地的前提。";
  }

  if (done) {
    return (
      <div className="page">
        <div className="page-header"><div className="container"><div className="page-title">体检结果</div></div></div>
        <div style={{maxWidth:'640px',margin:'48px auto',padding:'0 32px'}}>
          <div style={{background:'white',border:'1px solid var(--border)',padding:'40px',textAlign:'center',marginBottom:'24px'}}>
            <div style={{fontSize:'11px',letterSpacing:'0.16em',color:'var(--text-muted)',textTransform:'uppercase',marginBottom:'16px'}}>您的企业AI准备度</div>
            <div style={{fontFamily:'var(--font-display)',fontSize:'64px',fontWeight:700,color:levelColor,lineHeight:1,marginBottom:'8px'}}>{pct}分</div>
            <div style={{fontFamily:'var(--font-serif)',fontSize:'24px',fontWeight:700,color:levelColor,marginBottom:'24px'}}>{level}</div>
            <div style={{width:'100%',height:'8px',background:'var(--border)',marginBottom:'32px'}}>
              <div style={{width:`${pct}%`,height:'100%',background:levelColor,transition:'width 1s ease'}}></div>
            </div>
            <div style={{fontSize:'15px',color:'var(--text-mid)',lineHeight:1.85,textAlign:'left',borderLeft:'3px solid '+levelColor,paddingLeft:'20px'}}>
              {advice}
            </div>
          </div>
          <div style={{textAlign:'center',display:'flex',gap:'12px',justifyContent:'center'}}>
            <button className="btn-hero" onClick={()=>{setAnswers({});setCurrent(0);setDone(false);}}>重新测试</button>
            <button className="btn-hero-outline" style={{color:'var(--text)',borderColor:'var(--border)'}} onClick={()=>setPage('home')}>加微信深聊</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="container">
          <div className="page-title">企业财务AI准备度体检</div>
          <div className="page-subtitle">10道题 · 3分钟 · 基于17年CFO实战经验设计</div>
        </div>
      </div>
      <div style={{maxWidth:'640px',margin:'48px auto',padding:'0 32px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'32px'}}>
          <div style={{flex:1,height:'4px',background:'var(--border)'}}>
            <div style={{width:`${((current)/questions.length)*100}%`,height:'100%',background:'var(--blue)',transition:'width 0.3s'}}></div>
          </div>
          <span style={{fontSize:'12px',color:'var(--text-muted)',flexShrink:0}}>{current+1} / {questions.length}</span>
        </div>
        <div style={{fontFamily:'var(--font-serif)',fontSize:'20px',fontWeight:700,marginBottom:'28px',lineHeight:1.5}}>
          {questions[current].q}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          {questions[current].a.map((opt,i)=>(
            <button key={i} onClick={()=>{
              const newA = {...answers,[current]:i};
              setAnswers(newA);
              if(current < questions.length-1){ setCurrent(current+1); }
              else { setDone(true); }
            }} style={{
              background: answers[current]===i ? 'var(--navy)' : 'white',
              color: answers[current]===i ? 'white' : 'var(--text)',
              border: `1px solid ${answers[current]===i ? 'var(--navy)' : 'var(--border)'}`,
              padding:'14px 20px',
              textAlign:'left',
              fontSize:'14px',
              fontFamily:'var(--font-sans)',
              cursor:'pointer',
              transition:'all 0.15s',
              lineHeight:1.5
            }}>
              {opt}
            </button>
          ))}
        </div>
        {current > 0 && (
          <button onClick={()=>setCurrent(current-1)} style={{background:'none',border:'none',color:'var(--text-muted)',fontSize:'13px',cursor:'pointer',marginTop:'20px',fontFamily:'var(--font-sans)'}}>
            ← 上一题
          </button>
        )}
      </div>
    </div>
  );
}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>企业上市注册 | 有二财经</title>
<style>
  :root {
    --blue-dark: #0a1628;
    --blue-mid: #0d1f3c;
    --blue-accent: #3b82f6;
    --blue-light: #60a5fa;
    --blue-glow: #93c5fd;
    --white: #ffffff;
    --gray: #94a3b8;
    --gray-light: #e2e8f0;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--blue-dark);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Progress bar */
  .progress-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10, 22, 40, 0.95);
    backdrop-filter: blur(10px);
    padding: 12px 20px;
    display: none;
    align-items: center;
    gap: 12px;
  }
  .progress-wrap.show { display: flex; }
  .progress-label {
    font-size: 13px;
    color: var(--gray);
    white-space: nowrap;
  }
  .progress-bar-bg {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue-accent), var(--blue-light));
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Screen base */
  .screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
  }
  .screen.active { display: flex; }

  /* ── Screen 0: Welcome ── */
  .s0-hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 32px;
    text-align: center;
    background: linear-gradient(180deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
    position: relative;
    overflow: hidden;
  }
  .s0-hero::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
    top: -100px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }
  .s0-badge {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--blue-light);
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.8;
  }
  .s0-title {
    font-size: 40px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--white) 40%, var(--blue-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .s0-sub {
    font-size: 16px;
    color: var(--gray);
    line-height: 1.7;
    max-width: 360px;
    margin-bottom: 48px;
  }
  .s0-cta {
    width: 100%;
    max-width: 320px;
    background: linear-gradient(135deg, var(--blue-accent), var(--blue-light));
    color: white;
    border: none;
    padding: 16px 32px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(59,130,246,0.3);
    margin-bottom: 16px;
  }
  .s0-cta:active { transform: scale(0.97); }
  .s0-note {
    font-size: 12px;
    color: rgba(148,163,184,0.6);
    text-align: center;
    max-width: 320px;
    line-height: 1.6;
  }
  .s0-features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 40px;
    max-width: 320px;
  }
  .s0-feature {
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .s0-feature-icon {
    font-size: 20px;
    margin-bottom: 8px;
  }
  .s0-feature-text {
    font-size: 12px;
    color: var(--blue-glow);
    font-weight: 600;
  }

  /* ── Question screen ── */
  .q-header {
    padding: 20px 20px 0;
    position: sticky;
    top: 52px;
    z-index: 90;
    background: var(--blue-dark);
  }
  .q-section-title {
    font-size: 13px;
    color: var(--blue-light);
    font-weight: 600;
    letter-spacing: 1px;
    padding: 8px 0;
